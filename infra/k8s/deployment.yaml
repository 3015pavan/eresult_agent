---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-agent-api
  namespace: email-agent
  labels:
    app: email-agent
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: email-agent
      component: api
  template:
    metadata:
      labels:
        app: email-agent
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: email-agent:latest
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: email-agent-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: email-agent-secrets
                  key: redis-url
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: email-agent-secrets
                  key: openai-api-key
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      imagePullSecrets:
        - name: registry-creds

---
apiVersion: v1
kind: Service
metadata:
  name: email-agent-api
  namespace: email-agent
spec:
  selector:
    app: email-agent
    component: api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-agent-worker
  namespace: email-agent
  labels:
    app: email-agent
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: email-agent
      component: worker
  template:
    metadata:
      labels:
        app: email-agent
        component: worker
    spec:
      containers:
        - name: worker
          image: email-agent:latest
          command:
            - celery
            - -A
            - src.common.celery_app
            - worker
            - --loglevel=info
            - --concurrency=4
            - -Q
            - email_ingestion,document_parsing,extraction,default
          env:
            - name: APP_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: email-agent-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: email-agent-secrets
                  key: redis-url
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: email-agent-secrets
                  key: openai-api-key
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: email-agent-api-hpa
  namespace: email-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: email-agent-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: email-agent-worker-hpa
  namespace: email-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: email-agent-worker
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: email-agent-ingress
  namespace: email-agent
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - results.university.edu
      secretName: email-agent-tls
  rules:
    - host: results.university.edu
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: email-agent-api
                port:
                  number: 80
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: email-agent-api
                port:
                  number: 80
